name: 安卓签名打包

on:
  workflow_dispatch:  # 仅支持手动触发

jobs:
  o:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Java 21 环境
        # cordova-android@15 + Android SDK 36 需要 Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 配置 Android SDK 基础环境
        uses: android-actions/setup-android@v3

      - name: 安装 Android SDK Platform 36 及编译工具
        # cordova-android@15 编译引用了 API 36 常量，必须安装完整 SDK 36
        run: |
          sdkmanager --update
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: 全局安装 Cordova
        run: npm install -g cordova@latest

      - name: 安装项目依赖
        run: npm install

      - name: 添加 Android 平台
        run: cordova platform add android

      - name: 自动生成签名 Keystore
        run: |
          # 生成到工作区根目录，使用绝对路径避免 Gradle 路径解析错误
          keytool -genkeypair -v \
            -keystore $GITHUB_WORKSPACE/tyan.keystore \
            -alias tyan \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass Tyan2026 \
            -keypass Tyan2026 \
            -dname "CN=App, OU=Dev, O=Org, L=City, ST=State, C=CN"

      - name: 分 CPU 架构打包签名 APK
        run: |
          # 支持的 CPU 架构列表
          ABIS=("arm64-v8a" "armeabi-v7a" "x86_64")
          mkdir -p output

          for ABI in "${ABIS[@]}"; do
            echo ">>> 正在打包架构：$ABI"

            cordova build android --release -- \
              --packageType=apk \
              --gradleArg="-Pandroid.defaultConfig.abiFilters=$ABI" \
              --keystore=$GITHUB_WORKSPACE/tyan.keystore \
              --storePassword=Tyan2026 \
              --alias=tyan \
              --password=Tyan2026

            # 按架构重命名归档
            cp platforms/android/app/build/outputs/apk/release/app-release.apk \
               output/tyan-${ABI}.apk

            echo ">>> $ABI 打包完成"
          done

      - name: 压缩所有签名包
        run: zip -j tyan.zip output/*.apk

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 签名安装包
          path: tyan.zip
          retention-days: 7