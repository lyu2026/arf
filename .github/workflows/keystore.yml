name: 安卓签名

on:
  workflow_dispatch:
    inputs:
      alias_name:
        description: '密钥别名 (Key Alias)'
        required: true
        default: 'wow'
        type: string
      validity_days:
        description: '有效期(天)'
        required: true
        default: '100000'
        type: string
      organization:
        description: '组织名称'
        required: false
        default: 'other'
        type: string

jobs:
  generate-keystore:
    runs-on: ubuntu-latest
    
    steps:
      - name: 查看代码库
        uses: actions/checkout@v4

      - name: 安装Java环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 生成随机密码
        id: passwords
        run: |
          STORE_PASS=$(openssl rand -base64 32 | tr -d "=+/" | cut -c1-16)
          KEY_PASS=$(openssl rand -base64 32 | tr -d "=+/" | cut -c1-16)
          echo "store_password=$STORE_PASS" >> $GITHUB_OUTPUT
          echo "key_password=$KEY_PASS" >> $GITHUB_OUTPUT
          echo "::add-mask::$STORE_PASS"
          echo "::add-mask::$KEY_PASS"

      - name: 生成签名
        run: |
          keytool -genkey -v \
            -keystore app-release.keystore \
            -alias "${{ inputs.alias_name }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity ${{ inputs.validity_days }} \
            -storepass "${{ steps.passwords.outputs.store_password }}" \
            -keypass "${{ steps.passwords.outputs.key_password }}" \
            -dname "CN=${{ inputs.organization }}, OU=Development, O=${{ inputs.organization }}, L=City, ST=State, C=CN"

      - name: 加密签名为Base64
        id: encode
        run: |
          KEYSTORE_BASE64=$(base64 -w 0 app-release.keystore)
          echo "keystore_base64=$KEYSTORE_BASE64" >> $GITHUB_OUTPUT
          echo "::add-mask::$KEYSTORE_BASE64"

      - name: 生成配置文件
        run: |
          cat > keystore-config.json << EOF
          {
            "alias": "${{ inputs.alias_name }}",
            "store_password": "${{ steps.passwords.outputs.store_password }}",
            "key_password": "${{ steps.passwords.outputs.key_password }}",
            "validity_days": ${{ inputs.validity_days }},
            "created_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "organization": "${{ inputs.organization }}"
          }
          EOF

      - name: 将密钥库作为构建产物上传
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore
          path: |
            app-release.keystore
            keystore-config.json
          retention-days: 7

      - name: 显示器设置说明
        run: |
          echo "## 🔐 Android 签名密钥已生成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 密钥信息" >> $GITHUB_STEP_SUMMARY
          echo "- **别名 (Alias)**: \`${{ inputs.alias_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **有效期**: ${{ inputs.validity_days }} 天" >> $GITHUB_STEP_SUMMARY
          echo "- **组织**: ${{ inputs.organization }}\"" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ 重要：请立即保存以下信息到 GitHub Secrets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret 名称 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| \`KEYSTORE_BASE64\` | \`${{ steps.encode.outputs.keystore_base64 }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`KEYSTORE_PASSWORD\` | \`${{ steps.passwords.outputs.store_password }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`KEY_ALIAS\` | \`${{ inputs.alias_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`KEY_PASSWORD\` | \`${{ steps.passwords.outputs.key_password }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 下载文件" >> $GITHUB_STEP_SUMMARY
          echo "密钥文件和配置文件已保存为 Artifact，请在 7 天内下载保存。" >> $GITHUB_STEP_SUMMARY