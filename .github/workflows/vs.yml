name: Debug Keystore Secret

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Debug Keystore Base64
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "📊 Secret 诊断信息"
          echo "===================="
          
          # 检查是否为空
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "❌ KEYSTORE_BASE64 未设置"
            exit 1
          fi
          
          # 显示长度
          LENGTH=${#KEYSTORE_BASE64}
          echo "Base64 字符串长度: $LENGTH"
          
          # 检查长度是否合理（keystore 通常 2-3KB，Base64 编码后约 2700-4000 字符）
          if [ $LENGTH -lt 1000 ]; then
            echo "⚠️  警告：长度过短，可能不是完整的 keystore"
          elif [ $LENGTH -gt 10000 ]; then
            echo "⚠️  警告：长度过长，可能包含了多余字符"
          else
            echo "✅ 长度正常"
          fi
          
          # 显示前50和后50字符
          echo ""
          echo "前50字符:"
          echo "${KEYSTORE_BASE64:0:50}"
          echo ""
          echo "后50字符:"
          echo "${KEYSTORE_BASE64: -50}"
          
          # 检查是否有换行符或空格
          if echo "$KEYSTORE_BASE64" | grep -q $'\n'; then
            echo "⚠️  包含换行符"
          fi
          if echo "$KEYSTORE_BASE64" | grep -q ' '; then
            echo "⚠️  包含空格"
          fi
          
          # 尝试解码
          echo ""
          echo "🔐 尝试解码..."
          
          # 方法1: 直接解码
          echo "方法1: 直接解码"
          if echo "$KEYSTORE_BASE64" | base64 -d > test1.keystore 2>&1; then
            echo "✅ 直接解码成功"
            ls -lh test1.keystore
            file test1.keystore
          else
            echo "❌ 直接解码失败"
          fi
          
          # 方法2: 去除空白后解码
          echo ""
          echo "方法2: 清理后解码"
          CLEAN_BASE64=$(echo "$KEYSTORE_BASE64" | tr -d '\n\r\t ')
          if echo "$CLEAN_BASE64" | base64 -d > test2.keystore 2>&1; then
            echo "✅ 清理后解码成功"
            ls -lh test2.keystore
            file test2.keystore
          else
            echo "❌ 清理后解码失败"
          fi
          
          # 方法3: 使用 Python 解码
          echo ""
          echo "方法3: Python 解码"
          python3 << 'EOF'
          import os
          import base64
          
          b64 = os.environ['KEYSTORE_BASE64']
          b64_clean = ''.join(b64.split())
          
          try:
              data = base64.b64decode(b64_clean)
              with open('test3.keystore', 'wb') as f:
                  f.write(data)
              print(f"✅ Python 解码成功，文件大小: {len(data)} bytes")
              
              # 检查文件头
              if data[:4] == b'\xfe\xed\xfe\xed':
                  print("✅ 确认为 Java Keystore 格式")
              else:
                  print(f"⚠️  文件头: {data[:20].hex()}")
          except Exception as e:
              print(f"❌ Python 解码失败: {e}")
          EOF
          
          # 检查生成的文件
          echo ""
          echo "📁 生成的文件:"
          for f in test*.keystore; do
            if [ -f "$f" ]; then
              echo "  $f: $(ls -lh $f | awk '{print $5}')"
            fi
          done
